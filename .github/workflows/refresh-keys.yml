name: Refresh keys

# Runs every 12 hours and on manual dispatch. Fetches the current hCaptcha
# build, extracts all SIX master keys (3 HSJ + 3 HSW including the n_key
# captured at the AES encrypt call site), writes them to data/keys.json,
# and archives the snapshot at data/archive/<version>.json. Commits +
# pushes only if the build hash rotated (otherwise the run is a no-op).
#
# Average runtime: ~3 minutes end-to-end (5 extracted + 1 capture +
# 2 verification round-trips). Well within the free tier.

on:
  schedule:
    # 00:00 and 12:00 UTC every day
    - cron: "0 0,12 * * *"
  workflow_dispatch: {}      # manual trigger from the Actions tab

permissions:
  contents: write            # so the bot can push to main

concurrency:
  group: refresh-keys
  cancel-in-progress: false  # let any in-flight run finish

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: System libraries for canvas
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install Python deps
        run: pip install pycryptodome xxhash msgpack jsbeautifier requests

      - name: Install Node deps
        # `npm ci` (not `npm install`) — deterministic install from the
        # lockfile that NEVER modifies package-lock.json. `npm install`
        # silently rewrites the lockfile when npm's lockfile schema
        # differs from what's checked in, leaving the file as an
        # unstaged tracked-file modification that breaks `git rebase`
        # in the retry-on-push-rejection block below.
        run: npm ci --no-audit --no-fund

      - name: Run extractor with validation
        id: extract
        env:
          PYTHONPATH: src
        run: |
          set -euo pipefail

          success=0
          rm -f new_keys.json fetch.log

          for attempt in 1 2 3; do
            echo "Extraction attempt ${attempt}/3"

            rm -f new_keys.json fetch.log

            if python -m hcaptcha >new_keys.json 2>fetch.log; then
              if [[ -s new_keys.json ]]; then
                success=1
                break
              fi

              echo "::warning::Extractor exited successfully but produced empty output"
            else
              echo "::warning::Extraction attempt ${attempt} failed"
            fi

            tail -n 50 fetch.log || true

            if [[ "$attempt" -lt 3 ]]; then
              sleep $((attempt * 30))
            fi
          done

          if [[ "$success" -ne 1 ]]; then
            echo "::error::All extraction attempts failed"
            echo "===== final fetch.log ====="
            cat fetch.log || true
            exit 1
          fi

          python <<'EOF'
          import json
          from pathlib import Path

          path = Path("new_keys.json")

          if not path.exists():
              raise SystemExit("new_keys.json was not created")

          if path.stat().st_size == 0:
              raise SystemExit("new_keys.json is empty")

          try:
              d = json.loads(path.read_text(encoding="utf-8"))
          except json.JSONDecodeError as exc:
              preview = path.read_text(
                  encoding="utf-8",
                  errors="replace",
              )[:500]
              raise SystemExit(
                  f"new_keys.json is invalid JSON: {exc}\n"
                  f"Output preview:\n{preview}"
              )

          required_hsj = {
              "n_key",
              "response_decrypt_key",
              "payload_encrypt_key",
          }
          required_hsw = {
              "encrypt_key",
              "decrypt_key",
              "n_key",
              "fingerprint_blob_key",
          }

          missing = []

          if not required_hsj.issubset(d.get("hsj", {})):
              missing.append("hsj")

          if not required_hsw.issubset(d.get("hsw", {})):
              missing.append("hsw")

          verified = d.get("verified", {})
          for key in (
              "hsw_encrypt_key",
              "hsw_decrypt_key",
              "hsw_n_key",
              "hsw_fingerprint_blob_key",
          ):
              if not verified.get(key):
                  missing.append(f"verified.{key}")

          if missing:
              raise SystemExit(
                  f"output validation failed: missing {missing}"
              )

          print(f"validated: version {d['version'][:12]}...")
          EOF

          VERSION="$(
            python -c \
              "import json; print(json.load(open('new_keys.json', encoding='utf-8'))['version'])"
          )"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Write current + archive
        env:
          VERSION: ${{ steps.extract.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p data data/archive

          mv new_keys.json data/current.json
          cp data/current.json "data/archive/${VERSION}.json"

          ls -la data/ data/archive/ | tail -n 20

      - name: Commit + push if changed
        env:
          VERSION: ${{ steps.extract.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "build hash unchanged — skipping commit"
            exit 0
          fi
          git commit -m "auto: refresh keys for build ${VERSION:0:12}"

          # Reset any unstaged modifications to tracked files (e.g. a
          # lockfile npm touched, line-ending drift) so the rebase
          # below sees a clean working tree. Our commit is preserved.
          git checkout -- .

          # Retry up to 5 times: another push may land between fetch and push.
          for attempt in 1 2 3 4 5; do
            if git push 2> push.err; then
              echo "committed + pushed (attempt $attempt)"
              exit 0
            fi
            if ! grep -q "rejected\|non-fast-forward\|fetch first" push.err; then
              cat push.err
              exit 1
            fi
            echo "push rejected (attempt $attempt) — rebasing on origin/main"
            git fetch origin main
            git rebase origin/main
            sleep $((attempt * 2))
          done

          echo "::error::push still rejected after 5 attempts"
          exit 1
